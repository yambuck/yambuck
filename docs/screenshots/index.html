<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yambuck Screenshots</title>
    <meta
      name="description"
      content="Screenshot gallery for Yambuck alpha preview."
    />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="screenshots-page">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <main class="page">
      <header class="hero">
        <div class="brand-lockup" aria-label="Yambuck">
          <img src="../favicon.svg" alt="" aria-hidden="true" />
          <span>Yambuck</span>
        </div>
        <h1>Screenshot Gallery</h1>
        <p class="hero-copy">
          End-to-end alpha flow: package discovery, guided install, launch, and installed-app management.
        </p>
        <p class="command-note">
          <a href="../index.html">Back to install page</a>
        </p>
      </header>

      <section class="install-card" aria-labelledby="screenshots-title">
        <div class="install-card-header">
          <h2 id="screenshots-title">Current UI</h2>
          <span class="status">Alpha Preview</span>
        </div>

        <div class="screenshots-grid" id="screenshots-grid">
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open choose package step screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installer-1.png" alt="Yambuck installer choose package step" data-full-src="./yambuck-screenshot-v0.2.0-installer-1.png" />
            <figcaption>Choose package</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open package selected in GNOME Files screenshot">
            <img src="./yambuck-screenshot-v0.2.0-gnome-files.png" alt="Example package selected in GNOME Files" data-full-src="./yambuck-screenshot-v0.2.0-gnome-files.png" />
            <figcaption>Package selected in GNOME Files</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open package details step screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installer-2-1.png" alt="Yambuck package details screen" data-full-src="./yambuck-screenshot-v0.2.0-installer-2-1.png" />
            <figcaption>Package details</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open package details technical view screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installer-2-2.png" alt="Yambuck package details with technical metadata" data-full-src="./yambuck-screenshot-v0.2.0-installer-2-2.png" />
            <figcaption>Package details with technical metadata</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open trust verification step screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installer-3.png" alt="Yambuck trust and verification step" data-full-src="./yambuck-screenshot-v0.2.0-installer-3.png" />
            <figcaption>Trust and verification</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open license agreement step screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installer-4.png" alt="Yambuck license agreement step" data-full-src="./yambuck-screenshot-v0.2.0-installer-4.png" />
            <figcaption>License agreement</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open license text dialog screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installer-5.png" alt="Yambuck license text dialog" data-full-src="./yambuck-screenshot-v0.2.0-installer-5.png" />
            <figcaption>License text dialog</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open install scope step screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installer-6.png" alt="Yambuck install scope step" data-full-src="./yambuck-screenshot-v0.2.0-installer-6.png" />
            <figcaption>Install scope</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open install complete step screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installer-7.png" alt="Yambuck install complete screen" data-full-src="./yambuck-screenshot-v0.2.0-installer-7.png" />
            <figcaption>Install complete</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open launched example app screenshot">
            <img src="./yambuck-screenshot-v0.2.0-example-app.png" alt="Launched Yambuck Example App window" data-full-src="./yambuck-screenshot-v0.2.0-example-app.png" />
            <figcaption>Launched example app</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open installed apps list screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installed-apps.png" alt="Yambuck installed apps list" data-full-src="./yambuck-screenshot-v0.2.0-installed-apps.png" />
            <figcaption>Installed apps list</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open installed app details screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installed-app-details-1-1.png" alt="Yambuck installed app details overview" data-full-src="./yambuck-screenshot-v0.2.0-installed-app-details-1-1.png" />
            <figcaption>Installed app details</figcaption>
          </figure>
          <figure class="screenshot-card" tabindex="0" role="button" aria-label="Open installed app technical details screenshot">
            <img src="./yambuck-screenshot-v0.2.0-installed-app-details-1-2.png" alt="Yambuck installed app technical details" data-full-src="./yambuck-screenshot-v0.2.0-installed-app-details-1-2.png" />
            <figcaption>Installed app technical details</figcaption>
          </figure>
        </div>
      </section>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button type="button" class="lightbox-nav lightbox-nav-prev" id="lightbox-prev" aria-label="Previous screenshot">&#10094;</button>
      <button type="button" class="lightbox-nav lightbox-nav-next" id="lightbox-next" aria-label="Next screenshot">&#10095;</button>
      <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Close fullscreen screenshot">Close</button>
      <img id="lightbox-image" class="lightbox-image" alt="Fullscreen screenshot preview" />
    </div>

    <script>
      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightbox-image");
      const lightboxClose = document.getElementById("lightbox-close");
      const lightboxPrev = document.getElementById("lightbox-prev");
      const lightboxNext = document.getElementById("lightbox-next");
      const cards = Array.from(document.querySelectorAll(".screenshot-card"));
      const images = cards
        .map((card) => card.querySelector("img"))
        .filter((item) => item !== null);
      let activeImageIndex = -1;

      function showImageAt(index) {
        if (!lightboxImage || images.length === 0) {
          return;
        }

        if (index < 0) {
          activeImageIndex = images.length - 1;
        } else if (index >= images.length) {
          activeImageIndex = 0;
        } else {
          activeImageIndex = index;
        }

        const image = images[activeImageIndex];
        const source = image.dataset.fullSrc || image.src;
        lightboxImage.src = source;
        lightboxImage.alt = image.alt;
      }

      function openLightbox(card) {
        const image = card.querySelector("img");
        if (!image || !lightbox || !lightboxImage) {
          return;
        }

        const imageIndex = images.indexOf(image);
        showImageAt(imageIndex);
        lightbox.classList.add("open");
        lightbox.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        if (!lightbox || !lightboxImage) {
          return;
        }
        lightbox.classList.remove("open");
        lightbox.setAttribute("aria-hidden", "true");
        lightboxImage.src = "";
        activeImageIndex = -1;
        document.body.style.overflow = "";
      }

      function showPreviousImage() {
        if (!lightbox?.classList.contains("open")) {
          return;
        }
        showImageAt(activeImageIndex - 1);
      }

      function showNextImage() {
        if (!lightbox?.classList.contains("open")) {
          return;
        }
        showImageAt(activeImageIndex + 1);
      }

      cards.forEach((card) => {
        card.addEventListener("click", () => openLightbox(card));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openLightbox(card);
          }
        });
      });

      lightboxClose?.addEventListener("click", closeLightbox);
      lightboxPrev?.addEventListener("click", (event) => {
        event.stopPropagation();
        showPreviousImage();
      });
      lightboxNext?.addEventListener("click", (event) => {
        event.stopPropagation();
        showNextImage();
      });

      lightbox?.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && lightbox?.classList.contains("open")) {
          closeLightbox();
        } else if (event.key === "ArrowLeft" && lightbox?.classList.contains("open")) {
          showPreviousImage();
        } else if (event.key === "ArrowRight" && lightbox?.classList.contains("open")) {
          showNextImage();
        }
      });
    </script>
  </body>
</html>
